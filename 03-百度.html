<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>baidu</title>
  <style>
    .nav {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 13px;
    }


    .nav a:link {
      color: #000;

      display: inline-block;
      margin-left: 15px;
      text-indent: 20px;


    }

    .search-form {
      display: flex;
      width: 640px;
      height: 44px;
      border: 1px solid #dfe1e5;
      overflow: hidden;
      margin-bottom: 30px;
    }

    html,
    body {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #fff;
    }

    * {
      margin: 0;
      text-align: left;
    }

    header {
      margin-top: 50px;
    }

    .search-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 20px;
      font-size: 16px;
    }

    .search-btn {
      width: 108px;
      background-color: #4e6ef2;
      color: #fff;
      border: none;
      font-size: 17px;
      cursor: pointer;
    }

    .search-btn:hover {
      background-color: #4662d0;
    }


    .nav a:visited {
      color: rgba(94, 88, 88, 0.5);
    }

    .qrcode {
      text-align: center;
      margin-bottom: 30px;
    }

    .qrcode img {
      width: 120px;
      height: 120px;
      margin-bottom: 8px;
    }

    .qrcode p {
      font-size: 14px;
      color: #666;
    }

    /* 底部链接 */
    .footer-links {
      text-align: center;
      font-size: 12px;
      color: #999;
    }

    .footer-links a {
      color: #999;
      text-decoration: none;
      margin: 0 8px;
    }

    .footer-links a:hover {
      color: #333;
    }

    .copyright {
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <nav class="nav">

        href="#"
        style="color: #fff; background-color: #4e6ef2; padding: 4px 8px; border-radius: 4px; text-decoration: none;">更多产品</a>
    </div>
  </nav>
  <header class="midle"><img src="./我的图片/baidu.png" alt="" height="100"></header>
  <form class="search-form" action=""><textarea class="search-input"></textarea><button class="search-btn">百度一下</button>
  </form>
  <div class="qrcode">
    <img src="./我的图片/二维码.png" alt="下载百度APP">
    <p>下载百度APP</p>
    <p style="font-size: 13px; margin-top: 5px;">有事搜一搜，没事看一看</p>
  </div>

  <!-- 底部链接 -->
  <div class="footer-links">

  </div>
</body>
